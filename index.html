<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Plaid</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    border-bottom: 1px solid #f0f0f0;
  }

  .nav-logo img {
    height: 60px;
    width: auto;
    object-fit: contain;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 24px 24px;
  }

  .phone-icon-wrap {
    width: 72px;
    height: 72px;
    background-color: #d6f5f0;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .phone-icon-wrap svg {
    width: 32px;
    height: 32px;
    stroke: #2bbfaa;
    stroke-width: 1.8;
    fill: none;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    color: #111111;
    text-align: center;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 14px;
    color: #555555;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 28px;
    max-width: 320px;
  }

  .phone-input-box {
    width: 100%;
    border: 1.5px solid #cccccc;
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: #ffffff;
  }

  .phone-input-box:focus-within {
    border-color: #555555;
  }

  .flag {
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }

  .country-code {
    font-size: 16px;
    color: #111111;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .phone-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 18px;
    color: #111111;
    background: transparent;
    letter-spacing: 0.5px;
    font-family: inherit;
  }

  .phone-input::placeholder {
    color: #999999;
    letter-spacing: 0.5px;
  }

  .terms-text {
    font-size: 13px;
    color: #777777;
    text-align: center;
    margin-bottom: 16px;
  }

  .terms-text a {
    color: #111111;
    text-decoration: underline;
    font-weight: 500;
  }

  .continue-btn {
    width: 100%;
    padding: 18px;
    background-color: #111111;
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    margin-bottom: 16px;
  }

  .continue-btn:active {
    background-color: #333333;
  }

  .skip-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 8px 0;
    background: transparent;
    border: none;
    color: #111111;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .skip-btn:hover .btn-text {
    text-decoration: underline;
  }

  .btn-text {
    display: inline-block;
    
  }

  .loader {
    display: none;
    width: 18px;
    height: 18px;
    border: 2.5px solid #d3d3d3;
    border-top: 2.5px solid #8a8a8a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .skip-btn.loading .btn-text {
    display: none;
  }

  .skip-btn.loading .loader {
    display: inline-block;
  }

  

  .skip-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="top-nav">
    <div class="nav-logo">
      <img src="plaid.png" alt="Plaid" />
    </div>
  </div>

  <div class="content">
    <div class="phone-icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" stroke-width="2"></line>
      </svg>
    </div>

    <h1 class="title">Enter your phone number</h1>
    <p class="subtitle">
      Use your phone number to log in or sign up with Plaid to go faster next time.
    </p>

    <div class="phone-input-box">
      <span class="flag">🇺🇸</span>
      <span class="country-code">+1</span>
      <input
        class="phone-input"
        id="phoneDisplay"
        type="tel"
        placeholder="(•••) •••-••••"
        maxlength="14"
        inputmode="numeric"
        autocomplete="off"
      />
      <input type="hidden" id="phoneReal" />
    </div>

    <p class="terms-text">
      By continuing, you agree to Plaid's <a href="#">Terms</a>
    </p>

    <button class="continue-btn" id="continuePhoneBtn">Continue</button>

    <button class="skip-btn" id="skipBtn" type="button">
      <span class="btn-text">Continue without phone number</span>
      <span class="loader" aria-hidden="true"></span>
    </button>
  </div>
</div>

<script>
  const display = document.getElementById('phoneDisplay');
  const real = document.getElementById('phoneReal');
  const continuePhoneBtn = document.getElementById('continuePhoneBtn');
  const skipBtn = document.getElementById('skipBtn');

  let rawDigits = '';

  display.addEventListener('input', function (e) {
    const newDigits = e.target.value.replace(/[^0-9]/g, '');
    rawDigits = newDigits.substring(0, 10);
    real.value = rawDigits;
    display.value = formatPhone(rawDigits);

    setTimeout(() => {
      display.setSelectionRange(display.value.length, display.value.length);
    }, 0);
  });

  display.addEventListener('keydown', function (e) {
    if (e.key === 'Backspace') {
      e.preventDefault();
      rawDigits = rawDigits.slice(0, -1);
      real.value = rawDigits;
      display.value = formatPhone(rawDigits);
    }
  });

  function formatPhone(digits) {
    if (digits.length === 0) return '';

    let result = '';

    if (digits.length > 0) {
      result = '(' + digits.substring(0, Math.min(3, digits.length));
    }
    if (digits.length >= 3) {
      result += ') ';
    }
    if (digits.length > 3) {
      result += digits.substring(3, Math.min(6, digits.length));
    }
    if (digits.length > 6) {
      result += '-' + digits.substring(6, 10);
    }

    return result;
  }

  continuePhoneBtn.addEventListener('click', function () {
    if (rawDigits.length === 10) {
      alert('Phone number submitted: +1' + rawDigits);
    } else {
      alert('Please enter a valid 10-digit phone number.');
    }
  });



skipBtn.addEventListener('click', function () {

  skipBtn.classList.add('loading');

  
  setTimeout(() => {
    window.location.href = "banklist.html";
  }, 3000);
});

  
</script>

</body>
</html>
