<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
    }

    .phone-frame {
      width: 430px;
      min-height: 100vh;
      background: #e9e9e9;
      border: 1px solid #bfbfbf;
      border-radius: 12px;
      overflow: hidden;
    }

    .top-logo {
      background: #ffffff;
      text-align: center;
      padding: 28px 20px 18px;
      border-bottom: 1px solid #dedede;
    }

    .top-logo img {
      max-width: 240px;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .divider {
      height: 14px;
      background: #efefef;
    }

    .login-card {
      background: #ffffff;
      margin: 0 10px;
      padding: 14px 14px 30px;
    }

    .form-group {
      margin-bottom: 26px;
    }

    .form-group label {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #1d1d1d;
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 50px;
      border: 1px solid #9f9f9f;
      border-radius: 4px;
      background:rgb(247, 248, 249);
      padding: 0 16px;
      font-size: 18px;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: #0d6bcf;
      box-shadow: 0 0 0 2px rgba(13, 107, 207, 0.08);
    }

    .show-btn {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #0d6bcf;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .login-btn {
      width: 100%;
      height: 48px;
      background: #006fcf;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 2px;
      margin-bottom: 20px;
    }

    .login-btn:hover {
      background: #005eb0;
    }

    .cancel-link {
      display: block;
      text-align: center;
      color: #006fcf;
      text-decoration: none;
      font-size: 16px;
      margin-bottom: 28px;
    }

    .help-text {
      font-size: 15px;
      line-height: 1.55;
      color: #1d1d1d;
    }

    .help-text a {
      color: #006fcf;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .phone-frame {
        width: 100%;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="top-logo">
      <!-- Replace logo.svg with your company SVG -->
      <img src="./amex/dls-logo-line.svg" alt="Company Logo" />
    </div>

    <div class="divider"></div>

    <div class="login-card">
      <div class="form-group">
        <label for="userId">User ID</label>
        <div class="input-wrap">
          <input type="text" id="userId" name="userId" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" />
          <button type="button" class="show-btn" onclick="togglePassword()">Show</button>
        </div>
      </div>

      <button class="login-btn" type="button">Log In</button>

      <a href="#" class="cancel-link">Cancel</a>

      <p class="help-text">
       To recover your User ID or Password, please visit americanexpress.com or the Amex App.
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const toggleBtn = document.querySelector(".show-btn");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleBtn.textContent = "Hide";
      } else {
        passwordInput.type = "password";
        toggleBtn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
