<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chase Login</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background:
        linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)),
        url("./Chase/chasebg.png") center/cover no-repeat;
    }

    .logo {
      width: 100%;
      text-align: center;
      padding-top: 20px;
    }

    .logo img {
      width: 180px;
      max-width: 80vw;
    }

    .main-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .signin-card {
      width: 330px;
      background: #f3f3f3;
      border-radius: 4px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .top-note {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 22px 22px 16px;
      color: #444;
      font-size: 14px;
      line-height: 1.35;
    }

    .lock-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .form-area {
      padding: 0 22px 22px;
    }

    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .field input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #8fa0b2;
      background: transparent;
      padding: 10px 0 8px;
      font-size: 16px;
      color: #222;
      outline: none;
    }

    .field input::placeholder {
      color: #5f6f82;
    }

    .password-wrap input {
      padding-right: 64px;
    }

    .show-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      color: #005eb8;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 6px;
    }

    .show-btn:hover {
      text-decoration: underline;
    }

    .token-field {
      display: none;
    }

    .token-row {
      display: flex;
      justify-content: flex-end;
      margin: 2px 0 16px;
    }

    .token-box {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px dotted #8e8e8e;
      padding: 4px 8px;
      background: #f8f8f8;
      font-size: 14px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    .token-box input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #0a64c9;
      cursor: pointer;
    }

    .signin-btn {
      width: 100%;
      height: 46px;
      border: none;
      background: #005eb8;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 3px;
      cursor: pointer;
      margin-bottom: 18px;
      transition: background 0.2s ease;
    }

    .signin-btn:hover {
      background: #004d97;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .links a {
      text-decoration: none;
      color: #005eb8;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .arrow {
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="./Chase/chaselogo.png" alt="Chase Logo" />
  </div>

  <div class="main-container">
    <div class="signin-card">
      <div class="top-note">
        <svg class="lock-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            fill="#444"
            d="M25.419 11.068h-3.906V8.792c0-4.036-2.753-6.148-5.472-6.148-3.166 0-5.553 2.644-5.553 6.148v2.276H6.669c-1.11 0-2 .89-2 2v12.86c0 1.11.89 2 2 2h18.75a2 2 0 0 0 2-2v-12.86a2 2 0 0 0-2-2m-8.28 6.81v4h-2.2v-4zm-4.651-9.086c0-2.694 1.83-4.148 3.553-4.148s3.472 1.283 3.472 4.148v2.276h-7.024V8.792Z"
          />
        </svg>

        <span>Chase won't share your username or password.</span>
      </div>

      <div class="form-area">
        <div class="field">
          <input type="text" placeholder="Username" />
        </div>

        <div class="field password-wrap">
          <input id="password" type="password" placeholder="Password" />
          <button type="button" class="show-btn" onclick="togglePassword()">Show</button>
        </div>

        <div id="tokenField" class="field token-field">
          <input type="text" placeholder="Token" />
        </div>

        <div class="token-row">
          <label class="token-box">
            <input id="tokenCheck" type="checkbox" onchange="toggleToken()" />
            <span>Use token</span>
          </label>
        </div>

        <button class="signin-btn" type="button">Sign in</button>

        <div class="links">
          <a href="#">
            Forgot username/password?
            <span class="arrow">›</span>
          </a>
          <a href="#">
            Not enrolled? Sign up now.
            <span class="arrow">›</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const password = document.getElementById("password");
      const btn = document.querySelector(".show-btn");

      if (password.type === "password") {
        password.type = "text";
        btn.textContent = "Hide";
      } else {
        password.type = "password";
        btn.textContent = "Show";
      }
    }

    function toggleToken() {
      const checkbox = document.getElementById("tokenCheck");
      const tokenField = document.getElementById("tokenField");

      tokenField.style.display = checkbox.checked ? "block" : "none";
    }
  </script>
</body>
</html>
