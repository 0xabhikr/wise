<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Sign In Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f5f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;

            color: #111827;
        }

        .page {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid #e5e7eb;
            background: #fafafa;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            color: #0f4c81;
            letter-spacing: 0.3px;
        }

        .lang-select {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            background: white;
        }

        .card {
            margin: 26px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 28px;
            background: #fff;
        }

        .logo-box {

            margin: 0 auto 22px;

            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 34px;
            font-weight: 700;
        }

        h1 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 28px;
            font-weight: 600;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            height: 54px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0 44px 0 14px;
            font-size: 15px;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: #1f7bbd;
            box-shadow: 0 0 0 3px rgba(31, 123, 189, 0.12);
        }

        .icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 24px;
            font-size: 15px;
        }

        .remember input {
            width: 20px;
            height: 20px;
        }

        .btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 8px;
            background: #0d74af;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background: #0b6394;
        }

        .links {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .links a {
            color: #0d74af;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            border-top: 1px solid #e5e7eb;
            padding: 24px 26px 34px;
            background: #fafafa;
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-size: 15px;
        }

        .footer-links a {
            color: #1f2937;
            text-decoration: none;
        }

        .brand-logo {
            height: 32px;
            width: auto;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 28px;
            text-align: right;
            color: #6b7280;
            font-size: 12px;
        }

        .logo-box img {
            width: 100px;
            height: 100px;
            height: auto;
        }

        @media (max-width: 480px) {
            .card {
                margin: 18px;
                padding: 22px;
            }

            .footer {
                padding: 20px 18px 28px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <img src="./capital/capital-one-logo.svg" alt="Company Logo" class="brand-logo">
            </div>
            <select class="lang-select">
                <option>English</option>
                <option>Hindi</option>
                <option>Spanish</option>
            </select>
        </div>

        <div class="card">
            <div class="logo-box">
                <img src="./capital/capital-one-logo.svg" alt="Company Logo">
            </div>
            <h1>Sign in to your account</h1>

            <form onsubmit="handleLogin(event)">
                <div class="field">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input id="username" type="text" placeholder="Enter your username" />
                        <span class="icon">👤</span>
                    </div>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input id="password" type="password" placeholder="Enter your password" />
                        <span class="icon" onclick="togglePassword()">👁</span>
                    </div>
                </div>

                <label class="remember">
                    <input type="checkbox" />
                    <span>Remember me</span>
                </label>

                <button class="btn" type="submit">Sign in</button>
            </form>

            <div class="links">
                <a href="#">Forgot username or password?</a>
                <a href="#">Set up online access</a>
            </div>
        </div>

        <div class="footer">
            <div class="footer-links">
                <a href="#">Contact us</a>
                <a href="#">Legal</a>
                <a href="#">Privacy</a>
                <a href="#">Security</a>
                <a href="#">Terms &amp; Conditions</a>
                <a href="#">Accessibility</a>
            </div>

            <!-- <div class="footer-note">
                Demo UI for your company
            </div> -->
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            passwordInput.type =
                passwordInput.type === "password" ? "text" : "password";
        }

        function handleLogin(event) {
            event.preventDefault();
            alert("Demo sign-in clicked. Connect this form to your backend.");
        }
    </script>
</body>

</html>
