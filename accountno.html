<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regions Bank – routing lookup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            color: #1d1d1f;
        }

        .phone-frame {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 120px;
            box-sizing: border-box;
            box-shadow: 0 0 1px rgba(0,0,0,0.05);
        }

        /* header reused */
        .header-bar {
            background: #ffffff;
            padding: 12px 18px 8px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .icon-btn {
            width: 54px;
            height: 22px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2a2a2a;
        }

        .progress-dots {
            display: flex;
            gap: 10px;
            padding: 0 6px;
        }

        .dot {
            flex: 1;
            height: 4px;
            border-radius: 999px;
            display: block;
        }
        .dot.active {
            background: #30c8ea;
        }
        .dot.inactive {
            background: #dce3e7;
        }

        .heading {
            text-align: center;
            padding: 0 30px;
            margin-top: 20px;
            font-size: 22px;
            font-weight: 550;
            color: #111;
        }

        .form-container {
            width: 320px;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-box {
            background: linear-gradient(45deg, #f5f5ff 0%, #fcf0ff 50%, #fffbf0 100%);
            border: 1px solid rgb(163, 41, 41);
            border-radius: 12px;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
        }

        .input-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 18px;
            color: #333;
        }

        .input-box input::placeholder {
            color: #6f6f6f;
        }

        .bottom-fixed {
            position: absolute;
            left: 26px;
            right: 26px;
            bottom: 30px;
        }

        .continue-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 8px;
            background: #747677;
            color: #ffffff;
            font-size: 22px;
            font-weight: 550;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.1s;
        }

        .continue-btn:active {
            background: #5a5b5c;
        }

        .link-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #090909;
            font-size: 17px;
            font-weight: 550;
            cursor: pointer;
            font-family: inherit;
        }

        .bank-result {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: #111;
            margin: 40px 0 10px;
            padding: 0 20px;
            word-break: break-word;
        }

        .sub-result {
            text-align: center;
            font-size: 16px;
            color: #3b3b3f;
            margin-bottom: 40px;
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            text-align: center;
            margin: 20px 30px 0;
        }
    </style>
    <!-- embed Inter font (optional fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,550;14..32,600&display=swap" rel="stylesheet">
</head>

    <div class="phone-frame" id="app">

            // ----- state & routing (tiny SPA) -----

            // mock of the python API call – returns a promise that mimics the exact response structure

                // This replicates the given python request but in browser fetch
                // IMPORTANT: CORS will block this because the API endpoint does not allow browser requests.
                // For demo/embed we simulate the response using a mapping table + optional network simulation.
                // Real integration would require a backend proxy or Plaid SDK with public key / link tokens.
                console.log('Simulating API call for routing:', routingNumber);

                // Simulate network delay
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        // actual API would return something like: {"translation":"Bank of America"}
                        // but we only have the sample for 026009593. We'll create a small mapping
                        const mockDb = {
                            '026009593': { translation: 'Bank of America' },
                            '021000021': { translation: 'JPMorgan Chase' },
                            '121000358': { translation: 'Wells Fargo' },
                            '053000196': { translation: 'Regions Bank' },
                            '074000078': { translation: 'Fifth Third Bank' },
                        };
                        const normalized = routingNumber.trim();
                        if (mockDb[normalized]) {
                            resolve({ translation: mockDb[normalized].translation });
                        } else {
                            // If not found, return a generic response like Plaid might (but we'll treat as unknown)
                            // In real API it might return something else; we'll simulate fallback
                            resolve({ translation: 'Other Financial Institution' });
                        }
                    }, 400);
                });
            }

            // two pages: 'input' and 'result'
            let currentPage = 'input';
            let currentRouting = '';
            let bankName = '';
            let errorMsg = '';

            // render function based on state
            function render() {
                if (currentPage === 'input') {
                    appEl.innerHTML = renderInputPage();
                    attachInputEvents();
                } else if (currentPage === 'result') {

            // event binding
            function attachInputEvents() {
                const inputEl = document.getElementById('routing-input');
                if (inputEl) {
                    inputEl.value = currentRouting; // sync
                    inputEl.addEventListener('input', (e) => {
                        currentRouting = e.target.value;
                        errorMsg = ''; // clear error while typing
                    });
                }

                document.getElementById('continue-btn')?.addEventListener('click', async (e) => {
                    const routing = currentRouting.trim();
                    if (!routing) {
                        errorMsg = 'Please enter a routing number';
                        render();
                        return;
                    }
                    if (!/^\d{9}$/.test(routing)) {
                        errorMsg = 'Routing number must be 9 digits';
                        render();
                        return;
                    }

                    // show loading / disable? for simplicity we just call
                    try {
                        // disable button? we'll just trust
                        const result = await callPlaidSearch(routing);
                        bankName = result.translation || 'Unknown institution';
                        currentPage = 'result';
                        errorMsg = '';
                        render();
                    } catch (err) {
                        errorMsg = 'Lookup failed. Try again.';
                        render();
                    }
                });

                document.getElementById('find-routing-btn')?.addEventListener('click', () => {
                    alert('In a real app: open routing number helper');
                });

                document.getElementById('close-btn')?.addEventListener('click', () => {
                    window.location.href = 'index.html'; // as in original
                });

                // back button: history.back as original
                const backBtn = document.querySelector('.icon-btn[onclick="history.back()"]');
                if (backBtn) {
                    backBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        history.back();
                    });
                }
            }

            function attachResultEvents() {
                document.getElementById('back-to-input')?.addEventListener('click', () => {
                    currentPage = 'input';
                    render();
                });
                document.getElementById('close-result')?.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
                document.getElementById('new-search-btn')?.addEventListener('click', () => {
                    currentPage = 'input';
                    render();
                });
                document.getElementById('done-btn')?.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            }

            // initial render
            render();
        })();
    </script>
