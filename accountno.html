<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing lookup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            color: #1d1d1f;
        }

        .phone-frame {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 120px;
            box-sizing: border-box;
            box-shadow: 0 0 1px rgba(0, 0, 0, 0.05);
        }

        /* header reused */
        .header-bar {
            background: #ffffff;
            padding: 12px 18px 8px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .icon-btn {
            width: 54px;
            height: 22px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2a2a2a;
        }

        .progress-dots {
            display: flex;
            gap: 10px;
            padding: 0 6px;
        }

        .dot {
            flex: 1;
            height: 4px;
            border-radius: 999px;
            display: block;
        }

        .dot.active {
            background: #30c8ea;
        }

        .dot.inactive {
            background: #dce3e7;
        }

        .heading {
            text-align: center;
            padding: 0 30px;
            margin-top: 20px;
            font-size: 22px;
            font-weight: 550;
            color: #111;
        }

        .form-container {
            width: 320px;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-box {
            background: linear-gradient(45deg, #f5f5ff 0%, #fcf0ff 50%, #fffbf0 100%);
            border: 1px solid rgb(163, 41, 41);
            border-radius: 12px;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
        }

        .input-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 18px;
            color: #333;
        }

        .input-box input::placeholder {
            color: #6f6f6f;
        }

        .bottom-fixed {
            position: absolute;
            left: 26px;
            right: 26px;
            bottom: 30px;
        }

        .continue-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 8px;
            background: #747677;
            color: #ffffff;
            font-size: 22px;
            font-weight: 550;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.1s;
        }

        .continue-btn:active {
            background: #5a5b5c;
        }

        .link-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #090909;
            font-size: 17px;
            font-weight: 550;
            cursor: pointer;
            font-family: inherit;
        }

        .bank-result {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: #111;
            margin: 40px 0 10px;
            padding: 0 20px;
            word-break: break-word;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.5);
            border-top: 2.5px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #555;
        }


        .sub-result {
            text-align: center;
            font-size: 16px;
            color: #3b3b3f;
            margin-bottom: 40px;
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            text-align: center;
            margin: 20px 30px 0;
        }
    </style>
    <!-- embed Inter font (optional fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,550;14..32,600&display=swap"
        rel="stylesheet">
</head>

<body>

    </div>

        <div class="heading">Enter your routing number</div>

        <div class="form-container">
    <div class="input-box">
        <input type="text" id="routing-input" placeholder="Routing number" value="${currentRouting}">
    </div>

    <div style="font-size:19px;margin-bottom:5px;">Enter your Bank Account No</div>
    <div class="input-box">
        <input type="password" id="account-input" placeholder="Bank account number">
        <span class="eye-btn" onclick="togglePassword('account-input', this)">
            <!-- Eye SVG -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </span>
    </div>

    <div style="font-size:19px;margin-bottom:5px;">Confirm Bank Account No</div>
    <div class="input-box">
        <input type="password" id="confirm-account-input" placeholder="Confirm bank account number">
        <span class="eye-btn" onclick="togglePassword('confirm-account-input', this)">
            <!-- Eye SVG -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                <circle cx="12" cy="12" r="3"/>

    </div>
</div>


        ${errorMsg ? `<div class="error-message">${errorMsg}</div>` : ''}

        <div class="bottom-fixed">
            <button class="continue-btn" id="continue-btn">
                <span id="btn-text">Continue</span>
            </button>
        </div>
        `;
            }


            // ----- attach events -----
            function attachInputEvents() {
                const routingInput = document.getElementById('routing-input');
                const accountInput = document.getElementById('account-input');
                const confirmInput = document.getElementById('confirm-account-input');

                routingInput?.addEventListener('input', (e) => {
                    currentRouting = e.target.value.replace(/\D/g, ''); // only digits
                    e.target.value = currentRouting;
                    errorMsg = '';
                });

                // Only digits for account
                accountInput?.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/\D/g, '');
                });

                confirmInput?.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/\D/g, '');
                });

                // ❌ Prevent paste in confirm field (bank-style)
                confirmInput?.addEventListener('paste', (e) => {
                    e.preventDefault();
                });

                document.getElementById('continue-btn')?.addEventListener('click', () => {
                    const btn = document.getElementById('continue-btn');
                    const btnText = document.getElementById('btn-text');

                    const routing = currentRouting.trim();
                    const account = accountInput?.value.trim();
                    const confirm = confirmInput?.value.trim();

                    if (!routing) return showError('Please enter a routing number');

                    if (!/^\d{9}$/.test(routing)) {
                        return showError('Routing number must be 9 digits');
                    }

                    if (!account) return showError('Please enter bank account number');

                    if (!/^\d+$/.test(account)) {
                        return showError('Account number must contain only digits');
                    }

                    if (account !== confirm) {
                        return showError('Account numbers do not match');
                    }

                    btn.disabled = true;
                    btnText.innerHTML = `<div class="spinner"></div>`;

                    setTimeout(() => {
                        window.location.href = "confirm.html";
                    }, 1200);
                });

                document.getElementById('close-btn')?.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            }


            function showError(msg) {
                errorMsg = msg;
                render();
            }


            window.togglePassword = function (id, el) {
                const input = document.getElementById(id);
                const isHidden = input.type === "password";

                input.type = isHidden ? "text" : "password";

                el.innerHTML = isHidden
                    ? `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.77 21.77 0 015.06-5.94"/>
                <path d="M1 1l22 22"/>
           </svg>`
                    : `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z"/>
                <circle cx="12" cy="12" r="3"/>
           </svg>`;
            };




            // initial render
            render();

        })();
    </script>
