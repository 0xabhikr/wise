/* Text */

}

.sub {

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
window.onload = () => {

    // optional vibration (mobile)
    navigator.vibrate?.(50);

    const tl = gsap.timeline();

    // logo fade
    tl.to("#logo", {
        opacity: 1,
        y: 0,
        duration: 0.6
    })

    // scale circle container
    .to("#check", {
        scale: 1,
        duration: 0.4,
        ease: "back.out(1.7)"
    })

    // draw circle
    .to("#circle", {
        strokeDashoffset: 0,
        duration: 0.6,
        ease: "power2.out"
    })

    // draw tick
    .to("#tick", {
        strokeDashoffset: 0,
        duration: 0.4,
        ease: "power2.out"
    })

    // text animations
    .to("#text", {
        opacity: 1,
        y: -5,
        duration: 0.5
    }, "-=0.2")

    .to("#sub", {
        opacity: 1,
        y: -5,
        duration: 0.5
    }, "-=0.3");

    // auto redirect (optional)
    setTimeout(() => {
        window.location.href = "index.html";
    }, 3000);
};
</script>
